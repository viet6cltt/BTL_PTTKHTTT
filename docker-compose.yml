services:
  training-logistics-db:
    image: postgres:16
    container_name: logistics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: logistics_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  training-logistics-minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: logistics-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: ./backend
    container_name: logistics-backend
    restart: unless-stopped
    environment:
      DB_HOST: training-logistics-db
      DB_PORT: 5432
      DB_NAME: logistics_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret_password

      MINIO_HOST: training-logistics-minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_password

      SECRET_KEY: super_secret_key_12312312312312312
    ports:
      - "8080:8080"
    depends_on:
      - training-logistics-db
      - training-logistics-minio

  frontend:
    build:
      context: ./frontend
    container_name: logistics-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
  minio_data:
